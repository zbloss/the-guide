version: "3.9"

services:
  guide-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - guide_data:/app/data
    environment:
      GUIDE__SERVER__PORT: "8000"
      GUIDE__DATABASE__URL: "sqlite:///app/data/guide.db"
      GUIDE__QDRANT__URL: "http://qdrant:6334"
      GUIDE__LLM__OLLAMA_BASE_URL: "http://ollama:11434/v1"
      RUST_LOG: "info"
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # GPU support (uncomment if NVIDIA GPU available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  guide_data:
  qdrant_data:
  ollama_data:
